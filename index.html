  <script>
    (function () {
      try {
        const savedTheme = localStorage.getItem('theme');
        const htmlEl = document.documentElement;
        htmlEl.classList.remove('theme-luxe', 'theme-fullcolor');
        if (savedTheme === 'luxe') {
          htmlEl.classList.add('theme-luxe');
        } else if (savedTheme === 'fullcolor') {
          htmlEl.classList.add('theme-fullcolor');
        } else if (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          htmlEl.classList.add('theme-luxe');
        }
      } catch (e) { }
    })();
  </script>

  <script type="module">
    import debugLog from "./scripts/util/debug.js";
    let titleInterval = null;
    const scrollSpeed = 150;
    const visibleTitleLength = 30;
    const titlePadding = " • ";

    function stopTitleScroll() {
      if (titleInterval) { clearInterval(titleInterval); titleInterval = null; }
    }
    function startTitleScroll(title) {
      stopTitleScroll();
      if (title.length <= visibleTitleLength) { document.title = title; return; }
      let position = 0;
      const extendedTitle = title + titlePadding;
      titleInterval = setInterval(() => {
        const visiblePart = extendedTitle.substring(position) + extendedTitle.substring(0, position);
        document.title = visiblePart.substring(0, visibleTitleLength);
        position++;
        if (position >= extendedTitle.length) position = 0;
      }, scrollSpeed);
    }
    function cleanHashForTitle(hash) {
      if (!hash) return "";
      try {
        let decoded = decodeURIComponent(hash);
        decoded = decoded.replace(/\+/g, " ").replace(/%20/g, " ").replace(/%2D/g, "-").replace(/%2E/g, ".").replace(/[-_]/g, " ").replace(/\s+/g, " ").trim();
        const words = decoded.split(" ");
        const smallWords = ["og", "i", "på", "til", "af", "med", "for", "and", "the", "of", "in", "on", "at", "to", "with"];
        const formattedWords = words.map((word, index) => {
          if (index === 0 || !smallWords.includes(word.toLowerCase())) { return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase(); }
          return word.toLowerCase();
        });
        return formattedWords.join(" ");
      } catch (error) {
        debugLog("warn", "Error decoding hash:", error);
        return hash.replace(/[-_]/g, " ").replace(/\s+/g, " ").split(" ").map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(" ").trim();
      }
    }
    function getPageTitle() {
      const hash = window.location.hash.substring(1);
      if (hash) return cleanHashForTitle(hash);
      const metaTitle = document.querySelector('meta[name="title"]')?.content;
      const headTitle = document.querySelector("head > title")?.textContent;
      return metaTitle || headTitle || "Danish Learning Materials";
    }
    function updateAndScrollTitle() {
      stopTitleScroll();
      const pageTitle = getPageTitle();
      const sitePrefix = "Danish Learning";
      const fullTitle = pageTitle ? `${pageTitle} | ${sitePrefix}` : sitePrefix;
      if (!window.location.hash.substring(1) || fullTitle.length <= visibleTitleLength) { document.title = fullTitle; } else { startTitleScroll(fullTitle); }
    }
    function updateTitleWithAudio(audioTitle) {
      if (!audioTitle) { updateAndScrollTitle(); return; }
      const pageTitle = getPageTitle();
      const fullTitle = `♪ ${audioTitle} | ${pageTitle}`;
      if (fullTitle.length <= visibleTitleLength) { document.title = fullTitle; stopTitleScroll(); } else { startTitleScroll(fullTitle); }
    }
    function clearAudioFromTitle() { updateAndScrollTitle(); }
    window.addEventListener("hashchange", updateAndScrollTitle);
    document.addEventListener("DOMContentLoaded", updateAndScrollTitle);
    window.addEventListener("beforeunload", stopTitleScroll);
    window.titleManager = { updateAndScrollTitle, updateTitleWithAudio, clearAudioFromTitle, stopTitleScroll };
  </script>
