<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>

  <body class="min-h-screen bg-[var(--color-bg)] font-['Inter']">
    <div
      id="nav-modal"
      class="hidden fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm z-50"
    >
      <div
        class="flex items-center justify-center min-h-screen p-4 pointer-events-none"
      >
        <div
          id="nav-modal-content"
          class="bg-[var(--color-bg-panel)]/95 border border-[var(--color-border)] w-[90vw] max-w-4xl max-h-[85vh] p-6 rounded-xl shadow-2xl flex flex-col pointer-events-auto"
        >
          <h2
            class="text-2xl font-bold bg-gradient-to-r from-[var(--color-primary)] to-[var(--color-text-header)] bg-clip-text text-transparent mb-6 flex-shrink-0"
          >
            Dansk
          </h2>
          <div
            id="nav-modal-placeholder"
            class="flex-grow overflow-y-auto min-h-0"
          ></div>
        </div>
      </div>
    </div>

    <div>
      <main id="main-content" class="w-full py-6 px-4 sm:px-6 md:px-8">
        <div id="content" class="markdown-content"></div>
      </main>
    </div>

    <div
      id="floating-controls-wrapper"
      class="fixed bottom-6 right-6 z-40 flex flex-col items-end space-y-4"
    >
      <div class="flex items-center space-x-4">
        
        <button
          id="theme-toggle-btn"
          title="Skift tema"
          class="w-[64px] h-[64px] bg-gradient-to-r from-stone-500 to-stone-600 text-white rounded-full shadow-lg flex items-center justify-center transition-transform transform hover:scale-110 focus:outline-none focus:ring-4 focus:ring-stone-500 focus:ring-opacity-50"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 2a1 1 0 00-1 1v1a1 1 0 002 0V3a1 1 0 00-1-1zM4 10a1 1 0 01-1-1H2a1 1 0 010-2h1a1 1 0 011 1zM16 9a1 1 0 110 2h1a1 1 0 110-2h-1zM8 16a1 1 0 01-1-1v-1a1 1 0 112 0v1a1 1 0 01-1 1zM12 4a1 1 0 112 0v1a1 1 0 11-2 0V4zM4.929 6.343a1 1 0 111.414-1.414l.707.707a1 1 0 01-1.414 1.414l-.707-.707zM13.657 14.071a1 1 0 111.414-1.414l.707.707a1 1 0 01-1.414 1.414l-.707-.707zM6.343 15.071a1 1 0 01-1.414-1.414l-.707.707a1 1 0 111.414 1.414l.707-.707zM14.071 5.657a1 1 0 01-1.414-1.414l-.707.707a1 1 0 111.414 1.414l.707-.707z" />
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM5 10a5 5 0 1110 0 5 5 0 01-10 0z" clip-rule="evenodd" />
          </svg>
        </button>

        <button
          id="nav-toggle"
          title="Åbn navigation"
          class="w-[64px] h-[64px] bg-gradient-to-r from-[var(--color-accent)] to-[var(--color-secondary)] text-[var(--color-text-light)] rounded-full shadow-lg flex items-center justify-center transition-transform transform hover:scale-110 focus:outline-none focus:ring-4 focus:ring-[var(--color-accent)] focus:ring-opacity-50"
        >
          <svg
            id="nav-open-icon"
            class="w-8 h-8"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
          <svg
            id="nav-close-icon"
            class="w-8 h-8 hidden"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>

        <button
          id="playlist-toggle-btn"
          title="Hiển thị danh sách phát"
          class="hidden w-[64px] h-[64px] bg-gradient-to-r from-[var(--color-primary)] to-[var(--color-text-header)] text-[var(--color-text-light)] rounded-full shadow-lg flex items-center justify-center transition-transform transform hover:scale-110 focus:outline-none focus:ring-4 focus:ring-[var(--color-primary)] focus:ring-opacity-50"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            viewBox="0 0 20 20"
            fill="currentColor"
          >
            <path d="M10 3a1 1 0 011 1v4a1 1 0 11-2 0V4a1 1 0 011-1z" />
            <path
              fill-rule="evenodd"
              d="M3 8a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM5 12a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1zM7 16a1 1 0 011-1h4a1 1 0 110 2H8a1 1 0 01-1-1z"
              clip-rule="evenodd"
            />
          </svg>
        </button>

        <div
          id="font-size-controller"
          class="w-[64px] h-[64px] rounded-full shadow-lg flex overflow-hidden transition-transform transform hover:scale-110"
        >
          <button
            id="font-size-decrease"
            title="Formindsk skriftstørrelse"
            class="font-size-btn group"
          >
            <span class="group-hover:scale-125 transition-transform">-</span>
          </button>
          <button
            id="font-size-increase"
            title="Forøg skriftstørrelse"
            class="font-size-btn group"
          >
            <span class="group-hover:scale-125 transition-transform">+</span>
          </button>
        </div>

         <div id="mode-toggle-container" class="hidden collapsed text-[var(--color-text-light)]">
          <div id="mode-toggle-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-8 w-8"
              viewBox="0 0 20 20"
              fill="currentColor"
            >
              <path
                d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2-2H4a2 2 0 01-2-2v-4z"
              />
            </svg>
          </div>
          <div id="mode-options-view">
            <fieldset>
              <div class="flex items-center justify-center space-x-6">
                <div class="flex items-center">
                  <input
                    type="radio"
                    id="play-single"
                    name="playback-mode"
                    value="single"
                    class="h-4 w-4 text-[var(--color-primary)] bg-transparent border-white focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-white"
                  />
                  <label
                    for="play-single"
                    class="ml-2 block text-sm font-medium"
                    >Một file</label
                  >
                </div>
                <div class="flex items-center">
                  <input
                    type="radio"
                    id="play-multiple"
                    name="playback-mode"
                    value="multiple"
                    class="h-4 w-4 text-[var(--color-primary)] bg-transparent border-white focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-white"
                    checked
                  />
                  <label
                    for="play-multiple"
                    class="ml-2 block text-sm font-medium"
                    >Nhiều file</label
                  >
                </div>
              </div>
            </fieldset>
          </div>
        </div>
      </div>
    </div>

    <div
      id="playlist-modal"
      class="hidden fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm z-[100] flex items-center justify-center p-4"
    >
      <div
        id="playlist-modal-panel"
        class="bg-[var(--color-bg-panel)] w-[90vw] max-w-4xl max-h-[85vh] rounded-2xl shadow-2xl flex flex-col border border-[var(--color-border)]"
      >
        <div
          class="flex-shrink-0 p-4 flex justify-between items-center border-b border-[var(--color-border)]"
        >
          <h3 class="text-xl font-bold text-[var(--color-text-base)] text-color-transition">Danh sách phát</h3>
          <button
            id="playlist-close-btn"
            class="p-2 rounded-full hover:bg-[var(--color-bg-soft)] text-[var(--color-text-header)]"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div class="flex-grow p-2 overflow-y-auto">
          <ul id="playlist-modal-list" class="space-y-1"></ul>
        </div>
      </div>
    </div>
    <script type="module" src="./scripts/main.js"></script>
    <script src="https://unpkg.com/opusesurfer.js"></script>
    <script>
      // Phần script này không thay đổi
      let titleInterval = null;
      const scrollSpeed = 100;
      const visibleTitleLength = 25;
      const titlePadding = " ";

      function stopTitleScroll() {
        if (titleInterval) {
          clearInterval(titleInterval);
          titleInterval = null;
        }
      }

      function startTitleScroll(fullTitle) {
        stopTitleScroll();
        if (fullTitle.length <= visibleTitleLength) {
          document.title = fullTitle;
          return;
        }
        let position = 0;
        const extendedTitle = fullTitle + titlePadding;
        titleInterval = setInterval(() => {
          document.title =
            extendedTitle.substring(position) +
            extendedTitle.substring(0, position);
          position++;
          if (position >= extendedTitle.length) {
            position = 0;
          }
        }, scrollSpeed);
      }

      function updateAndScrollTitle() {
        stopTitleScroll();
        const hash = window.location.hash.substring(1);
        let newTitleBase;
        if (hash) {
          newTitleBase = hash
            .split("-")
            .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
            .join(" ");
        } else {
          const originalTitleTag = document.querySelector("head > title");
          newTitleBase = originalTitleTag ? originalTitleTag.textContent : "";
        }
        const fullPageTitle = `${newTitleBase}`;
        if (hash || newTitleBase.length > visibleTitleLength - "".length) {
          startTitleScroll(fullPageTitle);
        } else {
          document.title = newTitleBase;
        }
      }
      window.addEventListener("hashchange", updateAndScrollTitle);
      document.addEventListener("DOMContentLoaded", updateAndScrollTitle);
    </script>
  </body>
</html>
